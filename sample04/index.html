<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>
    <style>
        .box {
            border: 1px solid #999;
            text-align: center;
        }
        .container {
            height: 300px;
            display: grid;
            grid-template-columns: 100px 1fr 100px;
            grid-template-rows: 100px 1fr;
            grid-auto-flow: row;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1" style="order: 2">box1</div>
        <div class="box box2" style="order: 3">box2</div>
        <div class="box box3" style="order: 1">box3</div>
        <div class="box box4" style="order: 4">box4</div>    
    </div>
</body>
</html>
