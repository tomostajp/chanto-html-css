<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .box1 {
            height: 80px;
            flex-grow: 1;
            background-color: red;
            color: white;
        }
        .box2 {
            flex-grow: 2;
            height: 100px;
            background-color: blue;
            color: white;
        }
        .box3 {
            width: 100px;
            height: 50px;
            background-color: green;
            color: white;
        }
        .container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            height: 300px;
            border: 1px solid #ccc;
            align-content: stretch;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1" style="order: 2; align-self: end">box1</div>
        <div class="box2" style="order: 1">box2</div>
        <div class="box3" style="order: 3; align-self: center;">box3</div>
    </div>
</body>
</html>
